body:
  text: 法語送燈藏主神光竊老胡單傳一星火種於清冷嚴凝之中隻臂擎寒不能撲滅三傳而至鬻薪蠻獠四傳而至龍潭德山雖欲息其虐焰始終不能吹滅鰲山夜半合火分贜千五百人挑灰撥火灯灯續明分光四海假使傾華藏之海倒玉峽之流應難濕其慧𦦨也灯藏主來自開先月磵老師席下雪寺相從每見其涵養端厚道韻超拔信知如廬阜顛崖怪石濵無凡草木矣戊申冬煩歸藏司解職後忽懷舊隱慰問猿鶴出紙需語為途中清伴遂應之曰方今祖庭秋暮覺苑春寒戰磨昏酣名風利雨誓當捏虗空為一燈盞瀝九江為一灯畑撚五老峰為一灯炷使少林龍潭雪嶠三灯烱烱無盡余當𣂏寒泉之波以洗老眼見其光明盛大行矣勉之示德秀侍者歸鄉省母太湖三萬餘頃之烟波蘇州有洞庭七十二峯之紫翠天下無烏啼月落鐘動寒山客程尚遠池空劒光霜冷轆轤古恨難消吳苑春濃芳心未歇越溪水急烟棹難尋若作境話會未具行脚眼在不作境話會並未具行脚眼在不見雪峰道盡大地撮來如粟粒米大者裡無你動轉處無你揀擇處掃其機境剖其藩封須是秀拔俊爽之流始得德秀侍者生緣吳中隸業翠峰遠來雪寺相依每見沈默端謹孜孜為道煩歸從香寮一年公字日進所學解職後便欲以藏鑰累之且言母老在堂丁時荒歉未下安居侍母之日短侍師之日長也就乞一語為途中警䇿昔那吒太子抵肉以還儉生不孝睦州編蒲以奉義出豐年倘能向句捉敗二佛祖用心處則吳山楚水不離目前子母恩情日疎日近方知山頭老漢太煞老婆心切示義奉侍者向上一路千聖不傳向上一路千聖不然言前道斷滴水氷生線路放開重關壁立今時學者於一切言句上有疑是為大病一切言句上無疑亦為大病溟鵬展翅天馬追風師子咬人韓驢逐塊眨得眼來蹉過又蹉過四明義奉侍者遠來相依煩歸侍寮每見其孜孜為道沈默自守替職後炷香求語為警䇿因謂之曰留香堂裡揖座燒香是有語耶是無語耶三毬堂上迎客送客是有句耶是無句耶者裡見得國師未曾三喚侍者不曾三應是汝負吾是吾負汝彼彼肝腸生鐵鑄出山相境風飄蕩昏腥埃愛氷錯注黃金胎逾城噬臍已不及凍餓雖死心難回出山出山了何事認著星兒被星誤禪河教海掃不乾回首邯鄲多謬路逾城午夜鐵心肝箭脫空弦力挽難有道可成山可出雪霜猶欠六年寒觀音願輪默運真機冥六入互用俱通靈八統虗曠色非色萬象喧摵聲非紅蓮泛香霜月苦悲心曲為時人傾柳瓶一雨利海平昏波不敢閑吹腥返聞淨觀具大悲在在化境圓通機金蓮香浮草色碧靈禽翔集天雲低磐陀石冷潮拍拍玉瓶柳軟春枝枝以聲求我空中影以色見我眼中眉百城童子歸何時苦心遠逐洪濤飛超證圓通頓忘光境黃金草色寒碧天春晝永定眼不搖瓶柳靜定久磐陀夜浪回錦心綉口向人開一針孔裡三千界線路無門笑善財葺綉金沙難掩玉魂飛碧藕香殘夢覺遲應以比丘身得度髑髏且待眼開時金沙化一老僧挑髑髏彌勒坐睡貪著塵寰不居尊貴堆堆坐地等何人舉世有誰是同類缼減界中風波日委閉眼依前不成睡拋離兜率天垂手閻浮界拈得主丈在肩未免打失布袋行貨沒些貴買賤賣長汀山色青如黛囊中有貨不須忙水遶汀流曲曲長誰信松根欠伸頃率陀宮掩幾昏黃松下欠伸達磨渡蘆流沙無關天無扄老竊挾詐窺王庭禁嚴玉陛守九虎赭面羞映紅袍輕長安長安雨雪聲蘆風葉葉搖心旌絕憐楊子江頭水一波不洗塵腥臊瑞靄臺城王氣新胡塵難滓玉樓春西來十萬無根脚全肯承當沒半人逆鱗一語駟不及舌逆流一葦逝波不回洛陽征夢酣風雪鳳臺倚天空崔嵬寶公顯異鍾靈雲蹤鳥道一十二面僧繇畫不成三十六化梁王不破宮妃執侍翠鬟低天神拱衛金申鎻鷹巢兮月冷鶴塔兮風高九百餘年事宛然山深雲暖蒼松老魚籃觀音衣珠露明籃魚風腥衒賣女色以偽亂真信知倚市無傾城𩯭亂釵橫丰姿英雅斂手無言弄真像假魚籃放下時如何捨落地價放籃在地定光蒙頂兮袖雲英英曳䇿兮道服輕清觸時暴虐兮蠅生片玉勸惡從善兮身為法城寂定光明兮中天月皎願海無邊兮百川潮平隨機而感曰雨曰晴此特師願力中之一塵太虗寥廓兮徒加丹青寒山手携破竹筒是甚閑舉止零零星星捨得菜查喜喜歡歡相逢誇鼎味香透普賢毛孔裡閣筆靜沈吟意中無活句清骨瘦如柴多為吟詩苦芭蕉葉上無愁雨芭蕉題詩拾得施于在苕菷一味弄奇恠紛紛飛飛竟日掃不休瑟瑟瀟瀟松頂風鳴籟狼藉文殊金世界錯脚到寒岩夢逐塵寰轉倚仗默思惟客情多繾綣峩嵋歸路如天遠初祖轢暑躪寒逾沙越漠鳳臺春霧深鷺渚寒潮落梁宮家不受糊塗寶誌公妄生描摸神光隻手終難扶嵩少至今寒色惡二祖求道艱難修行無力腰深積恨深雪白通心白斷隻臂於心何安禮三拜受胡迷惑逴得春從袖裡歸少林花果無顏色三祖宿業熏肌通身是病覔罪了無根難醫真病證脫居士俗氣不除接司馬宏張暗穽三傳花葉轉芬披狼藉何堪春滿徑四祖岩定孤禪脇席不印解脫了無門開眼入邪定名大醫起死無方賺頭陀逆條老命紫雲散盡花鳥殘風撼牛頭山雨淨五祖日暮窮途投胎蹉路污却濁港波遡流溺不死題壁偈惑亂參徒攤賊贓掗人暗渡叢林從此帶寒酸淮山愁聽黃梅雨六祖傳法無心擔柴有力潛身破碓坊偈楞伽壁竊衣污盂與獵為群辯風幡賊身欠密惡名千古辱宗風八十生為善知識政黃牛吟肩聳宕窖定眼湛湖水黃牛角指天八脚垂過鼻句外須明者个意郁山主回首看青天渾不顧脚下跌倒眼眩花山河光照夜蹇驢頭上角生也蜆子和尚以蝦為目向人開摝盡江波心未灰僧戒不持爭怪得為他庿裡出身來猪頭和尚風流徹骨恣癡獃覿面全提死眼開口裡不曾知由味猪頭飽喫素持齋宗道者祖意何曾悟得玄桐城客路渺風烟袈裟無相鞋無繰破綻終難裹得全泉大道古䇿橫肩韻絕塵目前大道體全真瓢中拍拍春如海一滴渾無醉得人平田婆客路相逢要實論何消姐語又婆言一犂春雨飜新綠難洗牛兒背上痕岩頭婆一棹雪轟未易酬親兒拋下恨難収恩波拍岸無行路月滿洞庭湖上秋趙州把數珠見燕趙無慠尊大不下禪床契南泉擬向即乖礙膺有物空過甲子七百餘一串數珠不出無悳有年數趙州古佛投子提油瓶參翠微問西來意勾賊破家對趙州覿面全提引鬼入弔從來見處摠瞞盰用處何曾有巴鼻不見道投子道底栽松萠心放不下白髮老頭陀一寸未入土礙人枝已多買薪來處語何堪村蠻出嶺南一字也不識手中柴一遍擔五祖顧圓悟鷄飛上闌干圖水冷橋橫山深雲暖指東話西情想變亂雞聲驚起故鄉情劍閣無梯歸夢斷百丈侍馬祖山行見野鴨圖沙禽影翩翩翔集適其類行客鼻頭酸痛處憑誰委樓臺倒影山容開孤雲不飛天在水平田圖客路相逢婆言姐語牛背痛加鞭多為不平處一犂春雨高原深至今荒却平田路扣角圖天竺秋陰飛來月夜一等弄精魂死生難放捨牛背聲中扣角歌餘音遠寄長松下百丈一喝耳聾山摧海傾如行而說炳猶日星以身為舌正今時之誤以己為律曠百世而彌新滔滔末流烏蟻戰爭瞻覩遺像昏懜當明故國喬木兮猶有典刑開山真覺祖師棒頭打脫早遭德嶠熱瞞跳下客床暗被岩頭鈍置一十二人最初投契不是棟梁材千五百眾舀自扚頭亦非瑚璉器衲僧向上全提要且了無巴鼻不謬喚作七家村土地本遠法師鴈門無關曉山霽虎溪激湍磨石齒東林社冷寒漏長白藕花開香霧細風流消歇晉衣冠大雅聲沈酣瓦耳虗空為天為紙影堂舊事應難紀巖頭笠重簑輕令嚴法弊停橈佇思時趂舡人未至凄凄恨逐蘋風起船子三寸離鈎一懸絲命怜悧人不來道吾杳無信朱涯潮落寒紅靜靈照女賣盡貧女相多因怨阿爺笟籬錢足陌饒現不饒賖馬郎婦一掬藕香浮牽人以慾鈎金沙痕玉冷難掩馬郎羞魚籃丹霞提主丈悲心一點海天長半斂珠衣冷射光賣弄這些貧賤相籃魚腥染玉蓮香衣寒衲冷貌古風高篤龐老瘦肩道伴對靈照覿面干戈居士在麼居士在麼三尺杖子攪黃河朝陽破綻通身不覆藏謾從刀尺上搏量工夫綿密急著手寒日初無一線長對月閑淹果荳為誰忙雪覆雙眉眼闞霜經卷難窮義難了雲根幾度月昏黃三咲東林社暖白藕吹香持戒破戒執相未忘溪聲何似笑聲長四睡人虎為群是何火伴心面不同夢想變亂風撼松門春色晚題䟦䟦癡絕和尚書心經諸老題後靈山向經中所談般若心法未空太白向紙上所傳般若手法未盡諸老向言中所贊般若句法未到雪峰與麼道未免獲謗般若罪題禪會圖佛法自漢至唐猶大明揭於中天一時主聖俟賢師禮優渥濡目禪河染指法味班班於竹帛矣甚以龐老一門坐立笑談遊戲生死足以激勵頹俗吁山川寂寥年代消歇崖枯水落爪伏鱗潛不獨愧見今時亦復愧見此圖矣題過水羅漢圖散為器者乃道之漓適於變者乃法之弊睶茲十六開士乘空如雲履水如地龍騰虎伏獅奮象旋鶴唳猿啼鹿花猴菓想其當時一期躐大乘之地不遠而樂為神通兒戲鄙事吁道之漓法之弊斯其可觀矣題佛心和尚墨蹟與淵藏主昔子房得石公所授素書房能用其一二糟粕足以亡秦興漢茲余以先師佛心所書普說授姪德淵藏主倘能用其所說而天下望剎皆吾父翁箕裘之業累曰能世其家豈獨希於子房者哉癡絕和尚和白雲和尚山居詩卷後白雲山中之雲閑中有淡玉山庵中之雲淡中有閑為雨從龍出游歸隱先後不同閑淡之趣一也吁世事浮華頹波日靡白雲蒼狗倐忽變更何當縛茅掛長松眼吟翁之詩繼翁之韻以遂素志偶閱此卷實獲我心玄峰通書記房扁七家村民卷後澧陽鰲山天下旅邸也自七家村土地家殘戶破藉沒貲財之後歷四百餘載願受一而為氓者幾希玄峰山人力於筆耕分債半堵以遂其丘園之志雞鳴狗吠四境相聞爭先慶賀仍欲鄙埜一語其後遂謂之曰家貧願鄰富題三生圖濯錦春晴篷窓夜雨茅簷一笑時竺天在何許三生愛別離一種冤憎遇拍波烟棹畫圖開馬牛風遠瞿塘怒龍藏主請䟦大慧書後肅觀妙喜老人與性庵主手帖首云以竹篦用事無須臾閑為道憂也二處得人百姓幸甚為國喜也豈後世訾浮屠氏謂無君親之道其可得乎龍藏主寶諸庶可以崇吾道而鎮浮薄也題趙庸齋鰲山閣真蹟庸齋先生大書鰲山閣三字為中際接待扁便方來之士知有覆車之戒寧無意於後世者哉潮陽鏡上人出其真染諸方老宿爭先題䟦欲得一語其後因謂之曰方今太平旅邸耳禪錫倦遊誰復作鰲山夢此卷宜束之高閣題司馬溫公帖余兒時讀公書其匡君澤民升降黜陟董狐史鰍不能過焉公母溫國太夫聶氏余忝同姓不意後公人二百五十餘年猶能覩公親染中間語言端謹筆力酋勁芒寒色正凜不可犯恍如見孔子於鄉黨篇中文維那請題先師佛心石田行西湖西北山北懸崖峭壁間有一片田地真是無人正眼著陳老師將三寸禿筆盡底掀赤手傳其飜素業自後深耕淺種炊無米飯飽餵方來文維那出其陳年左券欲余明白作保遂卷而還之曰文不在茲爾源藏主請題宿桑卷首仙宗源藏主闢其禪房以宿桑自扁請余證其義因謂之曰方今名風利雨戰磨昏酣愛網情河貪溺沈浚譬如迷人冥行曠野不㩮地而宿求其脫世機梏未易得也吾佛有浮屠氏桑下不三宿之戒世或譏之謂無人倫之義而取斷滅自種也殊不知真行無跡真空無依真照無所真夢無寤乾坤籧廬三界逆旅昆虫草木皆吾眷屬何地不可歸宿哉倘或念念不停新新不住則舉足下足何許非桑下也䟦通書記南路火帳後有十偈拜祖子玄子袖出南路火帳摩挲老眼為之點勘一上中間手條十事一一明白只是不合將常住久年物色侵為己用取之未免傷廉本欲併同行木上座以蒿枝拂用事適負暄無暇姑且一筆照過俟後向無字上別行鏤榜曉示以為後來遊山侵用者戒䟦輔藏主悼頌号岸西乃小師窓梅橫雪簷竹明霜萬籟消沈正音寥落余方坐忘之頓適鐵船藏主踵門出巨軸乃山中名勝些其姪輔藏主助哀之語不覺老懷凄動遂拂拭苔石向無絃徽外重為按指去也岸雲慘暮西日埋陰必竟是何曲調夫子哭顏妙喜和尚與妙空大師書前輩德行充實腥香四馳百世之下雖缺殘編簡得之者不啻夜光卞璧風頹俗薄去實就華道不及古縱盈溢幅花燦錦爛不過目頃委弃墻壁甚以土苴之不若今視妙喜老人趣太守之招與妙空之帖假其屠蘇暫以稅駕隨行柴薪屑屑關介惟恐動念其清德細行殆畏人知不知當時肆罵天之口以觸時忌從何得耶吁在則人亡則書偶閱此帖益重余高山景行之思用上人大機軸後拈花微笑斷臂安心早是佛法中微了也那更行棒行喝架箭擎杈自謂得其大機大用殊不志強弩之末不能穿魯縞矣用上人以大機自號群公各出語以發之其大機大用之旨盡在是矣鄙野不敢剩加一語於其後不見道雪峰底權上人號用衡物之重輕非衡石莫能平法之重輕非至人莫能負茲權上人以用衡自稱是欲秉其不平之志群公爭先較定不差毫𨤲猶欲山僧一語訂正其尾未免向無星處重為點山一二三四四三二一華嚴指掌圖華嚴法界包括十虗迷其宗者背覺合塵失其旨者南轅北越往往不無揚朱泣岐之歎竹院老人總而括之宿桑子書而刊之貴使一切人一舉首七處九會不離目前一斂念百城風月如指諸掌倘或執相而求圖上春風綠未休悼幽岩中山和尚頌後延祐丙辰春余舉中山延祐戊午秋余哭中山一喜一慟無端無端迦葉空懷喚阿難悼子玄通書記卷後西禪書記雪峰住靈石苑儀鳳丹穴書典六韜村民七家義兵養銳掃除魔畢放鶴亭空死守玄關萬夫莫死諸葛走生仲達悼萬山鎰首座軸後火燒世界空虗空不燒空此兩句辭戈頌寂滅叟正欲燎其生前口業呵吒佛祖之垢殊不知身後之謗虐焰愈熾雪峰見義勇為未免重為懺悔一上咄跳出火坑刀山萬仞笑翁霍山雲泉書嘉定端平間笑翁霍山雲泉三大老挾雷霆聲價喧撼聾瞶二以道鳴一以詩鳴百世之下雖殘編斷簡得之者不啻夜光卞璧鳴偶閱三帖起余三嘆石湖首座四題軸後石湖少奮英銳不群之志遙遙北征躪躒寒暑輿圖之廣足將半焉山川發靈奧之區佛祖顯垂化之跡眼中見豈獨此四事耶余意所謂酇傒人關先収圖籍矣琛上人血書楞嚴七處徵心八還辨見提獎嬌兒窮盡口業老瞿曇曲於愛弟之情也嘉定琛上人瀝其指血從而筆之然續佛慧命血脉不斷盡在是矣後之賢者毋墮安公破句之轍斷雲軸後悠悠卷舒爛爛古錦零分碎剪或斷或連於栢庭雲興偈中見矣只是一處猶欠完全雪山試為補看釘釘著懸掛著偈頌寶公塔殺氣鷹揚振木梢秦淮照影水痕交漫天鐵網炊巾下完卵偏尋舊覆巢法眼墖在建康無相寺菜園裡去來無相萬機冥早是泥加家上深未了當年行脚話遶籬內外菜抽心保寧塔在建康南門鐵索寺後金剛鑽子話何堪價索遼天死未甘大法乘繩鐵索朽一原秋色鎖城南應庵塔在天童一經虎穴差含沙抵死難防毒爪牙痛恨至今埋不得春風吹血上桃花密菴塔大徹何曾有悟門末梢句子果何遵當時晒谷無遺粒不到窮煎累子孫破庵塔在徑山庵破人亡草自春家私無一可區分浮屠三尺高天下礙塞凌霄峰頂雲石田塔三繞蘿龕訴苦情荒田不到少人耕春風契券重抄藉家住梨花村姓彭五臺方石力宏大智闢玄關毫涌金光石暈寒座局萬機無一轉隨方即易人圓難香山紅土刻骨寧忘振父恩眼祐愛水地天昏苦心碾盡飛塵土千手難収墜血痕白馬經臺道虗冥漠貴冥心真偽寧容一髮侵汙血不隨焦土盡葛藤無影翳黃金少林影石隻影孤栖雪窖漫九年無地著羞顏生平缺相終呈醜斷蘚雖遮石齒寒送長蘆鈞藏主天荒地老熟超宗落日孤雲眼眼空教外別傳無剩法長江吹冷一蘆風䥫菴拳頭竪起純鋼鑄打硬承當見幾人不到潑天爐鞴冷綉花蝕盡壁痕春太原聞梅老孚夢裡錯尋芳聲色叢中見未忘二十四橋風信遠枝枝吹恨不吹香大惠謫梅萬卉叢中獨擅芳騷人閣筆費平章不因踈放蠻烟外誰信枝頭別有香悼仰山雪岩和尚雙樹纏悲事可嗟說無所說太週遮業風寒攪雪岩雪一夜生埋小釋迦庚寅秋先師絕岸和尚示寂於杭之岑山聞訃有作岑山雲散月垂秋㵎水哀鳴日夜流孝順似兒應問見哭師淚上額尖頭密室單提一句銕崑崙據座方方白晝昏暗地何堪明付授黃梅放賊自開門光首座出世住崇福首座已出世了也崇山瑞色擁晴空自知結得冤憎甚無怪逢罵雪峰人遊古寺三題風低瑤草暗潮泉地闢天開見混元不識此基元已有三登九上別人門文殊臺寒聳雲邊一髮青高高有路界飛塵長虹貫日山含影曲為黃金一臂伸應潮泉來往如期信不移石泓澄碧自清山花褪雨浮紅膩香透尾閭春不知友人夜話凉飇獵獵逗窓紗枯坐清談隙月斜一語爭機失回互隔床飛唾濕灯花詮上人歸建鄴家住鳥衣夕照濵客因語別憶閑情六朝往事鳴今古偏寄長干塔上鈴東林復上人一尋寒木鐵橫肩眼冷南荒瘴雨天未入門時先識破衲衣香染晉池蓮棠溪靈根一種異春風曲曲寒流水印空誰信枝頭香韻少品題不到浣花翁芝庭地靈薦瑞紫英柔玉砌亭亭爛不収秀色可飡名可傲商山尺土富瓊樓竺鄉西乾正派許誰分一法應難舉似君白日空來知己少