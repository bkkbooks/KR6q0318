擲火火裡木人淚如雨法眷孚首座火言孚而信行確而端形諸外見之則易虗其中識之則難香烟起處坐脫立亡則不無先師意作麼生會啞寧可吞炭宸藏主火來自開先未離青玉峽袖裡摩尼光絕類暨發烏石嶺袖裡摩尼親擊碎擊碎後如何擲火紅爐飛雪陽焰飜波小師曇侍者火三年執侍玉無瑕十八春殘一夢賒夢破塵消恩義斷優曇火裏別開花法副寺火能闍梨佛事門中不捨一法千思萬筭計較得來抵死謾生有甚麼限般若無舟菩提有岸今日且修火觀鎰首座火唆臨濟參黃蘗萬山嶮絕色如墨接雲門嗣雪峰一徑落花春色濃寂滅相盡生死途窮木人把火燒虗空璘淨人火璘璘非玉碌碌非石黃梅死貨活賣時夜半三更人不識即今玉石俱焚時如何火裡烏龜雙眼赤嚴都寺入墖進道嚴身去名就實石牕灯盞颺下時幻泡空花復何物撫骨蛻骨龍眠香霧窟傳副寺火直指單傳陳年斷貫索橫拈倒用貼秤麻三斤竪火這裡豁開死眼火急飜身擲下火白灰輥出紅麒麟東都寺火東海潮平西岩月皎漚花滅盡光境忘三際空來一昏曉是則是只如楊岐逼慈明晚參事作麼生擲火近火先燋傑維那火江上青山屋頭春色一語傑出叢林千古飜成芽孽傑維那葉落歸根見得親火裡花開色如銕荊溪玻都文火石㵎氷生荊溪月白楊岐鬼眼豁開時玉石依前難辨別只今玉石俱焚時如何擲火散作玻𭹳成五色仁都寺火打圓相喚者个作金剛圈得麼仁者見為之仁打圓相喚者个作栗棘蓬得麼智者見為之智全死全生無是不是擲火火裡蝍蟟吞鱉鼻瓊堂主火瓊樹花殘虗堂漏靜風火無常掃除幻境擲火眼不見為淨瑤法公火老不傳衣守死善道瑤池月冷轉身時活句依前猶欠悟打圓相便向者裡悟去時如何擲火乾茅引火夢都寺火楊岐的旨了無要妙大夢忽醒時古今一昏曉掀飜圓覺伽藍時如何擲火順風縱燎證寮無火意絕攀緣道無修證認影迷頭通身是病某人薝蔔花開鐵樹春香艶不隨風火盡恠石珍首座火片板橫檐絕世高古虗空撒手便行時大地山河無寸土一物長靈不墮生死擲火火雲影裡恠石露樞局主火密運樞機未忘局量千思萬筭計較得來生死無明轉增妄想只如不落心思意想一句又作麼生擲火火曰炎上睿上人火知幾其神惟睿作聖喚作及第心空未是尅期取證掀飜圓覺伽藍時如何擲火火出木盡隆上座火大地隆平虗空凹凹踏飜死海浪飜空驚起泥牛雙角折別別擲下火日裡藏水火中釣鱉良監粮火善性良心明因識果捱到吹糠著米時一覺黃粱酣夢破便與麼去時如何擲火烏龜向火因監粮火數米量柴將勤補過死盡偷心急須頓悟何故因風吹火小師太上座火大初冥冥至理淵深會則目前包褁不會則生死漂沈師資義絕玄路難尋且從火裡別真金西翁梵西堂火梵音何來真空何像散席參方究竟得明生死無明轉增虗妄何故火無西旺璋首座火曾住院號錦溪我首座已出世錦濯溪流波已逝我首座已行脚珪璋也要重磨琢道絕功勳情忘鑑覺擲火焰冷紅爐雪花落了首座火曾住翠林清溪提為人句翠林倒影環清溪拶嶮崖機水激寒泉喧古㵎塵境空寂了無常地水火風真即幻只如睦州接雲門嗣雪峰又作麼生擲火雪中送炭日法公火黃梅昔日傳依不傳法雪峰今日傳法不傳衣是法非法了無異見死句活句惟己自知擲火何須秉火情人題同都管火浴中死同聲相應飛聖箭密露全鋒同道方知逼晚參暗中藏毒無生國裡一笑飜身生死海中未離垢濁擲火水浴何如火浴落髮殿前草無明草剗削盡時色窮歸皂珊瑚樹林月杲杲寸刃拈來寒光燁燁盡淨剗除纖毫不立雪裡一花開五葉付衣同附六人鷄足底黃梅底暗合明投無是不是全身任重時如何六人成大器一絲繫重不傳而傳要求密意密在汝邊付袈裟云袈裟搭在肩自讚潮州廣法文長老請讚法不可傳文不加點嗣永元學拙於愚據雪山道無兼善聲震海陽一新聞見潭裡鰐魚眼如電三峰定長老請讚金襴擁座玉麈談空定其宗如雲門之有文遠唱其道如慈明之有黃龍住山有前輩之古執應世無今時之變通秉權衡於量外欠繩尺於胸中似此絕標致誰能躡其蹤雲外三峯聳碧穹雲門彬長老請讚道絕古今機全殺活笑曾郎舀來千五眾木杓欠長鄙洋嶼打發十三人竹篦太短非色非聲滿耳滿眼雲門一曲江風暖視音明長老請讚機兮默默用兮冥冥攪螺江慣將折筋釘虗空不口寸丁即真即假非色非聲明月半牕梅影橫小阿應天貴長老請讚嚴冷難親溫良易見歷浙訪道尋師歸閩授宣住院大中之道洞徹玄微續雪嶠之灯光明發現無師之智孰盡其善克家有子貴宜得贒一滴寒泉浪拍天興福煜長老請讚氣宇閑澹面目巉岩出林白額腥風莫掩磨牙鱉鼻毒氣正酣描寫不得青出於藍煜煜星光輝斗南俶藏主繪像請讚智無師授學有專愚放出南山鱉鼻生擒南海鰐魚似這模樣其誰與俱何堪赤手捧天書小師正心藏主請讚口毒心慈氣嚴㒵古嗣永元不識佛心膺宣命對揚䒶子有胸中全屋之規模無蓋世驚人之名字何消描摸向人前殆似攘羊證其父外甥正韶都寺請讚遠之而冷即之而溫續廣陵道散音諧韶護滅中峰滅碎沙盆渭陽正派其來有源一滴寒泉四海分梅石宋宣教真贊鴈塔無心雞窻有意百稔猶幻兮傲時粃糠三教精研兮洞明一理肝腸鐵石至老難移平生心事梅花知平村李郡馬真贊巾籠犀頂秀挺芝眉卜重城之隱易書貿屋賦盤谷之歸疏泉鑿池炊夢忽醒人世已非桃源花靄春枝枝橫秀陳宣教真贊山雲癯而秀橫池月清而鏡明詩禮傳家兮禮席春暖湖海延士兮陳樓晝晴後學模範尚有老成故家喬木干雲青東禪方岩和尚像請贊岩岩偉瞻隆隆顯擢笑談融度外之町畦英特絕今時之作略閑居山之雲影自捲舒麗覺城之月輝流海嶽句下丹青機先描摸重重烟水昏樓閣送乾維那遊方乾坤今古日月明山川不逐郵傳更肩磨踵接烟塵腥沙空漢冷鸞鳳冥洞桃未到春葉零野草幾見霜叢青壁根主丈跳鳴芒鞋背蹙鴛鴦繩了無一語堪將行晴雲倒影飜玄泓送劒上人歸嚴州一錫朝離㵎泉曲凉空一雨收殘溽雪峰法道今何如但言粥足飯亦足衲僧無營亦無欲自家水牯自家牧釣名釣祿兩茫茫月浸嚴灘半釣玉寧上人回泉州雪鰲去天無一握南來北來難湊泊南山鱉鼻老磨牙南山白額頭帶角上人一見便面頭甘草何曾輕動著烏藤抝折到家時洛陽月冷潮痕落壽上人歸杭州上人久別西湖秋一笻來作南州遊青山在在栖棘閙樓閣處處昏鴉投寒泉收聲鐵虬蟄枯木春老苔花收參須自參急著手大法誰為正宗壽心花忽爾發現時桂子香瓢月如晝明藏主回潮陽省師向來別我鰲山巔今復見子逾十年孤笻冷挾北山雨毳衲香染西湖蓮倦遊懶作吳楚興歸夢飛逐炎雲邊參方貴展極則事圓相不用呈師前老余清興不可到瘴霧不礙雙眸懸韓公書堂灯火靜唐栢黛色應參䒶送先藏主重建那羅延窟南方法窟那羅延法師無表名始傳慈雲不遂野雲散雜花濃染岩花鮮木櫚亟鎖竺梵古鯨杵時撼蒼龍眠岩房掩寂曉色瞑朴握暖附寒孤禪銅瓶和月汲潭淥瓦甑敲火燒松烟千村萬落信脚到杖頭三合休論錢岩中勝絕神蜚越何當一䇿登窮巔經臺分我一笑暇老興引手摩青天恭侍者求遊方癡雲蔽天苦冥漠覺苑花殘寒色惡百城煙水空微茫善財處處失樓閣朝來有客來潮陽鰐海波中見頭角誰家虀甕應最深覔我遍參語一則欲書無語堪描摸四簷凄冷簷花落到方山寺方方屹立山如屏野色浮膩泉石清舍桐蛻子朝露冷草荳綻莢秋香零蛇村鼠落俯脚底逈隔凡俗烟塵腥我來似與小有約呼應萬象天風鳴可人景物雙眼明半窻日色山雲青仰山彥書記之徑山昔年曾飲姜杏盃香浮雪谷飜輕雷城南鍾瑞見英秀百草不敢爭春魁潮平三山瞑宿霧雨閉樓閣昏腥埃適途斧聲方閑明窓有意何當開滿襟吳楚賷舊恨秋興入夢無遲回龍門一代爭仰止招隗正築黃金臺中原寶首座之淨慈行行咲踏吳楚雲一夏兩錯應休論袖中自有中原價溫粹孰剖玄無根青山不斷行客路樓閣深閉誰家門金波寒湧葑痕合梅香柳影空黃昏楠藏主回浙㵎泉鳴秋聲歷歷烏石摩雲色如鉄枯木凝春夜定回方池蘸月涵虗碧宏開藏海花重重真機演出還演入司其鑰者喜得人不獨有權應有實梗楠杞梓法棟梁火棗交梨意荊棘功成解印湖山秋柳影梅香舊知識老我炎雲㵎雪濵吳楚相望興何極臨風重索餞行篇一語欲書還住筆玉泓飜水浪如激簷松吹香翠欲滴蓬萊清水遠庵主老禪清水庵中來氣挾清水無飛埃一從識得庵中主花片不染庵前苔胸中妙應有活法粒米不蓄兼蓙柴老來了却行脚債幾辨布襪隨青鞋毬門無關銕限古卵墖瑞靄祥烟開漲波梅雨激泉㵎倚天金碧飛樓臺好山抵事不少駐歸棹苦逐安溪回炎雲引首一笑活人間何處非蓬萊寄潮州東齋先生古今宗教師昌黎首以文學鳴海湄古瀛禮樂盛化地瘴雨不洗眉山地靈薦瑞天不靳爛爛照海奎星垂齋名以東慕東魯學古心古時難移會堂克家侍鰲頂極口公道談公詩老余深樵髮如雪何當一見掀雙眉雲橫烏石銕壁立怒漲古㵎春泉肥臨風奮筆徒依依寸心遠逐炎雲飛無藏主遊浙當時錯聽小艶詩藏海揭飜難洗耳聲塵消盡義路忘今古互融冥一理吳雲楚水清興長寓目溪山休寓意平田淺草須隄防不到大虫老無齒江空歲晚茲何時力道勇決無遲遲臨風一語難上紙四簷擁雪梅花飛小師奉維那遊浙凌晨炷別㵎泉曲切齒臨風無別囑沖雲有志合奮飛屋頭春色休馳逐溪藤書偈推晴窻簷竹飄寒散騰六諸方五味正炊香老僧一味拈不出罷參畢事却歸來地爐待子煨蘿蔔贈畫士有客有客來城隅袖裡秘𢯦丹青書胚奪造化胎元樞妹陋一髮窮緇銖愧余深樵雪滿顱毳衲寒染山雲曜筠簷閣雨松烟踈生綃半幅毋勞舒渠今非我我非渠太虗無影澄氷壺山林鍾𣇄分已殊大手當寫凌烟圖竹房開首座回建之大中竺𪻱芳披花雨紅天風剪水春光融上字可師前哲嶮崖句拶機全鋒峰頭數載閑相從極口每見高誼隆亭亭玉立竹房竹靄靄香挹松山松朝來語別情冲冲碧水遠激寒流淙難兄難弟無所擇迎門一笑懽相逢為余久踈多致恭尺箋不敢干飛鴻期將此道大中㵎水喜躍龍潭龍
