body:
  text: 再住雪峰崇聖禪寺語錄侍者正定編師於延祐元年閏三月初一日進寺捧聖旨云鳳闕春濃鰲山雪霽無所希求自天而至流出胸襟蓋天地江湖疏總萬象森羅為一舌頭且道是毀是譽度疏云總在裡許指法座盡大地撮來為一寶花王座盡天下人瞻仰有分雪峰今日步步陞高去也倘涉遲回座地為汝攝取拈祝聖聖香此一瓣香雪窖中埋藏不得香透九重老枯樵上芽孽重生芳騰上國臣僧悟逸今晨欽授聖恩仍舊住持福州路雪峰崇聖禪寺開堂之次遙瞻金闕上爇寶爐端為祝延今上皇帝聖躬萬歲萬歲萬萬歲皇帝陛下恭願八千歲舂八千歲龝椿樹散堯天之影三千年花三千年實蟠桃吹御苑之香此香奉為中書省宣政院諸位宰相國公資陪祿算伏願元樞上相正百官皇理陰陽佛法中興歷萬年永堅柱石此一瓣香奉為福建道元帥府廉訪司萬戶府總管府洎令屬司官資陪祿算伏願分司布職眾賢星列皆周召英材宣化承流八郡春融有成康至治此一瓣香本為深藏岩竇不競桃李繁華豈料漏池天風依舊揑香難栳一期拈出爇向爐中供養前住當山後住淨慈先師佛心大和尚用酧法乳無極之恩問答不錄提綱似則不住住則不似空澄北漢丹鳳翱翔山不為人出便為人風雨南陽臥龍奮迅賢德禈而下眾喙斯喑傒霓望而來重淵莫蟄拈拄杖看看君主大寶從天而降雲開鰲頂月法主大寶遇晦斯彰花綻㵎泉春廣陵散斷絃再續浪淘沙舊曲新飜以此宣流正教以此傳佛心宗天開地闢風從雲從車書一而文軌同舉法灯和尚云本欲依岩傍谷隱遁過時柰緣清凉先人有未了公案今日出來為伊了却師拈云法燈老人只知有持盈守成之心且無宏大箕裘之志山僧亦欲依岩傍谷隱遁過時只為先師佛心老人昨住此山有未了公案今日未免出來重為伊了商見義不為無勇也謝新舊兩班上堂舉臨濟和尚示眾云我欲建立黃檗宗旨汝等諸人切須成褫我時有克符普化二僧出禮拜師便打師云臨濟一言之下善其機者纔一二魯國男子何其少哉雪峰者裡總東弗于逮西瞿耶尼鱗龍頭角一時懽合各住本位各務本業進退以禮水乳一源是則是建立成褫則不無必竟是何宗旨咄花開世界起上堂舉僧問雪峰如何是第一句峰良久後僧舉似長生生云者个是第二句便問如何是第一句生云蒼天蒼天師云雪峰高高峰頂立長生深深海底行二大老雖則與麼要且未知第一句有問山僧如何是第一句天晴普請拽木四月旦城歸上堂道非物外意在目前十字街頭騎牛入閙市孤峰頂上仰面數屋椽拊它背覔文錢從教人笑掣風顛四月八浴佛上堂兜率王宮無明窠窟劫住劫空頭出頭沒年年此日一盆湯至竟洗塵難洗骨啞佛佛結夏小參拈主丈道在稊稗法雖法見融目皆真道在瓦礫脚底脚頭放光動地進一步踢碎釋迦老子天靈蓋退一步踏著從上諸祖鬼眼睛如是禁足望州亭畔月如是安居烏石嶺頭雲靈靈自照光境俱忘淡淡無心卷舒無礙便與麼去山僧主丈子要且未放過在卓主丈臨濟三玄浮山九帶結夏上堂從天平來我者裡過夏無暇為汝商量從瑯琊來我者裡過夏無暇為汝點化合土和沙乎真乎假安排意在明窓下五月旦上堂謝施主並方來兄弟盡大地是个解脫門踵接肩摩䥫樞無眼盡大地皆吾檀越雲川委側布金流野草岩花炎凉易換松風㵎水聲色熾然泰象亨時五百載適逢佳會來龍歇處三千口舊讖猶新土主松山一新風月難提印塔重換烟霞密室泥深玄闕設穽長街水滿火流空卓主丈正與麼日時真覺大師從定安詳而起與孚稜展備鵝湖鏡清之徒只今向山僧主丈頭與汝諸人說成住壞空四相竪主丈與麼會去諸相非法橫按主丈不與麼會去諸法非相總不與麼時如何卓主丈望州亭畔重携手總是開平舊會人結座說偈雪鰲倚空碧落開中有古佛號真覺舀來一杓龍象奔輥動三毬喧海嶽從緣非緣了無得住相非相徒名貌誓將一滴寒泉波洗昏衢塵劫濁木人起舞木馬嘶歲歲重來情不薄遍參有志如善財青山不患無樓閣真覺大師忌日拈香德山棒頭增減不得岩頭句下斤兩不移劫火洞然者个不壞蓋天蓋地愈出愈奇香疑卵塔瑞藹難提蔭凉全在刺桐枝臺州寶藏岩成山和尚至上堂時就東禪寺印補藏經畢鉢岩公案重圓三乘絕唱寶藏岩新功蓋代九仞成山白馬嘶寒征途不遠金雞聲曉客夢驚殘雪峰與麼道意在於何卓主丈盃酒陽關開元業鏡講主遣僧送寺遍至上堂客從遠方來遺我住寸璧中有四箇字字字無識若也識得許汝人拽紫芝峰與象骨峰鬪額其或未識拈主丈主丈子重為汝揩書一上卓主丈龍眠鳳闕虎躍天衢解夏小參佛法二千年春寒秋熱山中九十日夜暗晝明義學玄學髣髣髴髴等覺妙覺昭昭靈靈木船浮也須彌浪湧鐵舡浮也大地波傾修無修而所作已辦證無證而所業已成一機不動萬化消沈卓主丈云誰家砧杵送秋聲舉巴陵和尚問僧云遊山來為佛法來僧云清平世界說甚麼佛法陵云好个無事禪客僧云早是多事了也陵云上座去年曾在此過夏來僧云不曾陵云先來不相識下去拈云巴陵乃雪峰一世孫其對師論勘辨尚有乃祖風烈只是不合將佛法當人情者僧上門戶雖則言貌可觀終是禮數乖謬只如巴上陵和尚末後道先來不相識下去意在於何三盃延客酒一曲向頭吟八月旦上堂謝徑山會提點江心知客年提半提點即不到全賓全主到即不點中川夜月明雙徑秋雲斂雪峰與麼說話還知落處麼咄僧堂前與汝相見中秋上堂舉南泉趙州翫月處泉云幾時得似者个趙州拂袖便行師頌云兩兩宮娃醉管絃含情多在九霄邊桂香影裡輕移步偏與嫦娥鬪少年九月旦謝新前堂首座兼西禪藍田首座上堂我首座行脚也重霄奮丹鳳我首座來也一釣連六鰲機隨用顯境逐人高泉飜澗水夜添波宣政院所委為皷山寺入城歸上堂宣流善政燕北閩南石門關低含夜月通霄路暗鎻晴嵐行棒行喝彼此何堪雪峰嬴得放癡憨冬至小參諸佛不出世君子道長達磨不西來小人道消續𦦨聯芳敲氷取火單提獨唱剪水成花洞山掇退菓棹家貧難辦素食慈明堂前揭榜事忙不及草書雪峰者裡埋頭土木何曾知有許事東廊頭李都科疊枅底疊枅疊拱底疊拱西廊下陳愽士做柱底做柱做梁底做梁機機頓赴物物全彰寒梅澗底自吹香舉真覺和尚每於廊下見僧遂握一拳示之云森羅萬象草木叢林若男若女若僧若俗山河大地都總在者一握內師拈云真覺老人向孤峯頂上隻手持竿東海意圖盡得魚龍殊不知浪闊雲深上鈎者少雪峰今夜試下者一看以主丈垂釣勢歷細歷細上堂敘謝兩班葉二暫到能畫龍虎建法幢立宗旨同道相求同心相濟何故畫龍看頭畫虎看尾佛成道上堂霽雪漫山明星燦夜窮急討生分疎不下釋迦老子當時倘能向修德煉行處別道得一語熒惑何止從三舍上堂雲岩在藥山二十年單明此事驢揀濕處溺趙州除粥飯二時不雜用心狗䑛熱油鐺雪峰者裡早眠晏起倦座閑行不妨日午打三更上堂因謝道場知客雪峰一見僧遂問云甚處來者僧云淛中來師云船來陸來僧云二途俱不涉師云爭得到者裡僧云絲毫元不隔師便棒趂出師拈云者僧自淛中來入門欵子一一詣實雪峰因甚效德山用事曾為浪子偏憐客除夜小參洞山小參不點灯暗裡抽橫骨德山小參不答話明中坐舌頭腋下剜襟移長就短針頭削錢較寸爭分常住現成燈燭山僧隨分應酧輥雪峰毬天旋地轉打禾山皷岳震山搖燒榾柮火騰今耀古唱村田樂白雪陽春狸奴白牯笑掀眉減却一年添一歲竪拂子莫有不受歲底麼擊拂子梅添春雪白柳帶曉烟青應庵和尚舉僧問香林如何是衲衣下事林云臈月火燒山香林與麼道大似老鼠入來角有問歸宗如何是衲衣下事只向它道來年更有新條在惱亂春風卒未休師拈云二大老與麼說話一人道得著底道不著道不著底道得著撿點將來總欠一著有問雪峰如何是衲衣下事只向它道今歲今宵盡明年明日來元旦上堂春行上國澤下九天正元開泰日喜事已先傳何故上旬壬子是豐年元旦壬子灯夕上堂明歷歷黑漫漫真灯耀世融目光寒莫和煙雨看鰲山上堂敘謝雲門彬長老兼潮州廣通嗣書信亦通書亦通南海鰐魚頭帶角南山鱉鼻口吞空者个猶是啐同時句只如書中間說底是什麼事來山見船子雲門嗣雪峰上堂念念不停新新不住迷悟兩岐全機頓趣靈雲去後誰與論桃花枝上飜紅雨啟建上堂龍樓雲暖鳳闕春濃大千一統車書混同必竟雪峰如何祝頌卓主丈日出扶桑東佛涅槃上堂拘尸城業窟平熈連河愛水傾無憂芳樹老覺苑落花深閑愁一掬冷關情流鶯歌徹斷腸聲佛心先師忌日拈香一人泉淺古㵎泉深點水無涉恩深愁深今日為甚供陳蘋藻香爇水沈啞破鏡終懷五逆心月朔架佛殿上堂幻普光明殿於一彈指中大功不宰現丈六金身於一莖草上法令全彰象骨雲開寒泉春漲卓主丈蓋天蓋地看新樣浴佛上堂水拍金盆肌勻玉藕淨智圓明靈光獨耀金輪浴出扶桑曉上堂敘謝首座秉拂即此用離此用全主全賓有擒有縱龜毛拂子千鈞重白雲平麓和尚至上堂舉白雲志和尚見玄沙沙問云汝來作麼志云特來見和尚沙云相見後如何志云待展家風師拈云雲登玄沙之門一相見頃便白能大展家風如禮陳玉樂陳鐘鼓三代之盛書在帛是矣今日雪峰與白雲和尚相見其奈臂長袖短雖欲大展家風卒著手脚不辨雖然家貧願隣富五月二日祖忌上堂雪嶺初登如酇傒入關先収圖籍龍來歇處類孟甞門下食客三千輥動三毬蠻烟瘴雨杓頭提起烏喙砒霜發德山棒頭之用亞夫金鼓續龍潭紙灯之𦦨田單火牛法眼分宗新羅箭過雲門列派吳越令行印塔春融香凝燕𥨊松山瑞靄華搆方新泥牛吼月萬山寒木馬嘶風千嶂曉與麼說話且從汝諸人句下丹青只如祖師道望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也必竟意在於何連卓主丈三下莫恠坐來頻勸酒自從別後見君稀祖忌拈香印塔春融松山月皎大雅岸流蠅鳴蚓竅廣陵一曲千峰曉端午上堂肘後靈方不傳妙訣殺人活人有誰辨別㵎底菖蒲生九節上堂拈主丈大圭不錄至理忘言臨濟為甚三度問佛法雪峰為甚九度上洞山卓主丈一下麟遊兔徑虎食鵰殘中夏上堂諸佛秘訣列祖玄綱聲前句後無可商量山深六月凉六月望建深苗上堂時大風雨臨濟入門便喝抱甕灌畦德山入門便棒揠苗助長山僧不墮平常獨超今古一句試為諸人舉看秋色釀風打雨泉添㵎霖水激湍聲解夏小參去則印住雲橫烏石萬樹鳴秋住則印破月冷寒泉千波分影不去不住癩馬守空韈是印非印獼猴佩古鏡一夏商量兩鑄錢九州一夏開粥錯相伴溉腸夢甑雪峰者裡九十日內只如拖柴拽木晏起早眠有甚工夫論修論證何故眼不見為淨中秋上堂指月話月弄巧成拙廣寒洞無扄憑誰賞清絕換立嫦娥双𩯭雪九月旦上堂祈晴秘魔擎叉魯祖面壁暴風無崇朝驟雨無終月霧掃長空秋明八極駕海曦輪碾虗碧重陽上堂單提獨唱撒土拋沙黃花非般若般若非黃花多情風雨秋家十月旦開爐時城歸接香開藏經動靜一致賓主歷然蓼岸蘆汀僧歸夜舡月團滿曲九柴擁地爐烟天香騰瑞梵筴重宣小春歲歲梅花天達磨忌日拈香流沙浪急淹溺不得熊耳雲深埋沒不得即假即空非聲色風撼松濤山月白歸新僧堂上堂坐破蒲團心下事奔馳驢馬拈來木杓舀不上千五象龍漢官威儀不圖復見白我作古不宰其功高堂千古留香風上堂兼新維那時看藏經三乘要義一句全該後架桶篐𪹼綻堂前漆桶相揩咄新羅人草鞋上堂為吳國公捨藏經立兼鑄鐘一模鑄就大冶𨄍精金三藏絕詮古鑽白字覺淨塵消返聞絕見玉音撼動金殿至節小參鷲嶺拈花伏羲初畫少林面壁文王重爻大塊未形萬機潛寂一元既剖萬化昇沈那更向管灰中覰其消長一線上較其短長殊不志雲橫烏石雪消春自到寒泉浪涌水暖㵎融氷境隨人勝道逐時亨梅放南枝雪放晴舉僧問睦州一言道盡時如何州云老僧在汝鉢囊裡僧又問趙州一言道盡時如何裂破師拈云二老舌頭相似肝膽不同要得一言道盡未在今夜有問雪峰一言道盡時如何冬至前後砂飛石走至日上堂西來意冬來意枯木花從雪裡開瑞雪先呈三白喜何故乾道變化萬物茲上堂謝平山首座秉拂風月平分一天霽雪理事互融如何如說山到平中見孤絕上堂謝兩班明鏡當臺玄機在掌德懋懋官功懋懋賞雪峰者裡無重輕心無取捨相以拂子作秤勢總在無星秤子上臘八上堂昔年此日雪山雪深今年此日雪山雪晴雪山人午夜憨眠一覺雪山人午夜悟明一星道有所證道無所成留得雙眉蓋眼睛除夜小參雪店更殘征客夢驚寒旅枕雲床晝永守孤定空費蒲團剗削盡時胸中有物豁空見地簾外無天歷古窮今難消冷恨天荒地老舊話誰論說妙談玄陳年曆日分賓立主釘過桃符殊不知臘月三十日元是歲除夜五更鐘動依舊是新年象骨一峰高插天舉稅闍梨問曹山清稅孤貧乞師賑濟曹山云青原白家三錢酒喫了猶道未沾唇師拈云二大老一人口頭太長一人手頭較短若是者些殘盃餘瀝不消拈出雖消今夜有問雪峰某甲孤貧乞師賑濟山僧臂長袖短要且不負來機遂抖衣袖云見者有分元旦上堂龍樓薦瑞鳳曆須新九州四海咸沐堯仁雪山高並南山青上堂從文殊門入者墻壁瓦礫為汝發機從觀音門入者蝦蟆蚯蚓為汝發機從普賢門入者不動步而到雪峰者裡無許多限量無許多分別行也行到說也說到地靈步步雪山草上堂有世界以音聲為佛事有世界以莊嚴為佛事有世界以光明為佛事雪峰者裡三輪俱轉全放全収盃酒誰家獨上樓閏月上堂時大赦然燈前然灯後一年兩度慶元宵萬解金蓮徹昏曉彩鳳搏空金鷄唱曉九天一札頒新詔涅槃上堂金棺自舉業風不停化火自焚星焰不息年年此時年年此日何堪桃李春狼藉潮陽廣法會堂長老至上堂春靄鰲山潮平鰐渚啐同時正偏回互烟水南來合明何事卓主丈云百丈再參馬祖浴佛上堂王宮有意兜率無心貪著世相萬劫漂沈韶陽一棒打之不殺九龍吐水洗之不清雪峰這裡眼不見為淨結夏小參是鈴鳴是心鳴那吒擎鐵柱是風動是幡動波斯念八還明鏡當臺十虗洞照玄珠在堂大千普觀雪峰輥毬雪轟早地雲門念七鋏鑄重關與麼會去九十日長期晝明夜暗二千年佛法夏熱春寒正法眼爛泥團迦葉無端錯破顏舉僧問法眼和尚云如何是曹源一滴水法眼云是曹源一滴水其僧惘然時韶國師在座下聞此忽然大悟師拈云這僧向隨波逐浪處致者一問可惜法眼當時無截流之手致使國師向死水裡淹殺今夜有問雪峰如何是寒泉一滴水却向它道是寒泉一滴水眾中莫有頓悟底麼急洗耳結夏上堂一切法不生一切法不滅昔日摩竭陀國親行此令一切法亦滅一切法亦生今日象骨峰前親行此令無敢違者無敢犯者何故卓主丈云印印一定祖忌拈香云生緣不在刺桐城行脚何曾見德嶠五月長銜氷片寒嶺上木人開口笑且道咲个什麼插香云只為者些狼藉不少端午上堂肘後方秘傳訣不同草木瞞人靈驗者些自別卓主丈云㵎底菖蒲生九節上堂謝新首座碧幢風冷玉壘夜寒論功薦賞定謀以安令肅而嚴公弼之勇宏而恕子儀之寬山僧主丈子有一字暗號今日明為諸人說破卓主丈云關七月朔旦上堂朝碌碌暮悠悠常在家舍不離途中天共白雲曉常在途中不離家舍水和明月流色前不物聲外何求金井梧桐葉葉秋解夏小參一法若有色空明暗轇轕目前萬法若無愛水情河沈昏識內攢刺無路鼠入禾倉伎倆盡時狐狸渡水雪峰這裡毬門洞闢大用全彰九十日內與汝諸人打淨潔毬子透得過底西天此土透不過底此土西天東邊鐘樓插空千尺西邊鼓樓拔地千尋盧陵米價不妨貴賤賣買趙州石橋一任度馬度驢與麼說話猶是時人公幹邊事只如不墮有為不墮無為一句又且如何話會梧桐葉底秋聲早促織吟邊夜較長舉東山示眾云百煉黃金鑄鐵牛十分高價與人酬臺前不有花含笑應是東山一夏休師拈云東山和尚住山於紹興年間其寺門累徵官賦窘迫之際而其索遼天價誇大門戶可謂富而無敵山僧今夜鬪貧不鬪富未免續貂有作自家田地自鞭牛任性逍遙自唱酬水草不關王化事和雲和月飽還休解夏上堂盡大地撮來如粟米粒大百億微塵數諸佛百億微塵數眾生九十日內向一粒米中禁足安居今則井梧露冷玉宇雲寒所作以辦所業以成各依舊位各務本事山僧未免末後為伊摩須授記一上卓主丈云是牛拽擺是馬負鞍中秋上堂敘謝江心首座藏主侍者首座已行脚老兔夜寒忙搗藥侍者參得禪三脚蝦蟆飛上天照用同時一機不露三乘科列一理兼收雖然家住東州上堂舉南岳讓和尚一日見馬祖坐次乃問云若學坐禪若學坐佛若是坐禪禪非坐臥若是坐佛佛非定相既非定相不應取捨師云讓和尚誨馬祖諄諄之言如王良造父駕御權寄使毋奔馳衝突之患若是禪佛果有所學南岳七十二峰俱笑倒上堂舉達觀頴禪師示眾云山僧平生意好與人相撲祇是無人搭對今日且與首座搭對遂捲袈裟下座索首座相撲首座纔出師云平地上喫交便歸方丈師云達觀和尚與麼說話未免展干戈於談笑之間雪峰者裡終不妄自生風起草何故老不以筋力為能開爐上堂時翰林承旨程雪樓書寺額至兼謝幽岩首座火爐頭得一句不是韶陽一字關亦非巴陵三轉語總不與麼合談何事翰苑林敷薝蔔香大雄額扁黃金字上堂謝右田秀峰恒叟和尚古㵎鳴泉披峰削玉迭奏篔篪雅音正續雖然廣陵一曲何似凉州一曲上堂時看藏經舉僧問睦州和尚如何是一代時教州云上大人丘乙己師云睦州和尚平生擔板因甚向這僧面前傾腸露膽撿點將來未免傍觀者醜有問雪峰如何是一代時教池清明蘸月泉眼暗通潮上堂舉僧問古德達磨九年面壁事作麼生師云天寒無被蓋雪峰則不然達磨九年面壁事作麼生在家必達在必達冬至小參諸佛不出世周襄無暮年達磨既西來秦末無燠歲旁提正按滴水氷生續焰聯芳灰寒木槁縱使洞陰陽於黑荳未芽之先識機變於菅灰未動之際龍吟枯木古律新飜鸐宿松梢驚殘曉夢與麼會去猶落盈虗消長邊事總不與麼如何話會梅橫陰磵雪松偃南山青舉雲門問首座大地山河與自己是同是別首座云同雲門云一切物命飛蛾蟻子與自己是同是別首座云同雲門云好好借問何得干戈相待師云雲門布長戈於其前首座揭大戟於其後殆類㶚上棘門兒戲邊事雪峰有口終不與麼問何故袈裟同看上堂舉僧問雲峰悅和尚佛不化本國和尚為什麼歸鄉院峰云放過一著師云這僧盡力致者一問注殆欲箝雲峰之口殊不志正座在分別之區雪峰當時若見它與麼問只向道莫將太平曲吹倚戍邊樓祖忌拈香此香投子洞山三登九到艱難中收捨荒村陋店三更半夜平易處剗除火種者些累人不少蓋天蓋地熏烈如初慨古傷今不即不離涅柈後相非有非無松山烟雨開畵圖時火後上堂舉真州定山方和尚參廣照瑯瑘覺禪師每看栢子話凡遇入室欲呈所見纔擬開口常彼喝出一日忽大悟直造方丈云我會也師云汝會箇甚麼方云夜來床蓆暖一覺到天明師可之師云瑯瑘素善其點病之方爭柰不能起者僧沈昏之不見道一覺到天明結夏小參善財七日尋覔無方驟良駒於馬楸落日趙州五年分疎不下界穴蟻於尺地寸天路絕奔馳百城烟冷語無滲漏一字關玄無可商量山中九十日了無巴鼻佛法二千年誰修誰證誰後誰先月明夜夜浸寒泉五月二日謝方來并施主上堂播揚大教千尋枯木風撼九天流出胸襟一滴寒泉波分四海寂寂靈源苔封印塔如如大定瑞藹難提住世無心寶月晦中天之影再來有讖杉松偃拂地之枝四百餘年宛如今日七州管內思之以時廊東廊西綺羅風軟山前山後絃管晝遲以此資明時之至治以此槙檀信之福基只如祖師道三到道場是吾眷屬必竟有何所據卓主丈象骨峰頭無字佛心和尚忌拈香說法一十三會道不侯時住世八十六年愚不及古下泥犁種家丘壑何曾諳曉農桑提破沙盆振家聲絕響雷鳴瓦釜無羅龍打鳳之機籌有積雪嚴霜之面具是致冷落門庭說著熱人腸肚柳影湖光消磨幾許烟梢濕梨花雨浴佛上堂破鏡生兒離毒樹墮地能行便能語五天無光日色苦九龍攫春吐腥霧雪峰用處拙於古木杓拈來作佛事和泥和水輥風雨亂紅飜波㵎聲怒結制小參為食來為法來十方聚會徒困風塵起佛見起法見百億錢圍無閑日月金塵未透識網縵空力道無根劣波易下今則制嚴三月山僧約法三章眼毋妄見雲行鳥飛耳毋妄聞山鳴谷應口毋妄談呵風罵雨全收全放全主全賓一理纔明大用融徹然後居之安資深左右逢其原其或未忘鑒覺妄之起奔馳咄投子道底舉投子和尚一日因見榮禪客來參師云老僧平常無一言半句落在諸方上座來此間作麼僧云若不禮三拜要且不甘師云衲僧家得與麼沒記僧便禮拜師拈云投子和尚只有閉門作活之計且無開路延賢之心雪峰當時若見它道若不來禮三拜要且不甘遂喚維那移下掛搭何故老來提鞋挈履也少一箇半箇不得祖會上堂三登投子陽關三疊閑送客愁長九上洞山九曲羊腸難禁風雨夕棒頭打脫鱉鼻磨牙句下承當大虫插翼道鳴南國百億世界聲撼雷霆灯焰兩宗百億乾坤光流杲日龜銘自著爛金石於翠琰玄圭塔戶宏開安纍卵於大山磐石消融不盡氷滿長街鑽仰無門泥深密室蓋天蓋地不易絲毫亘古亘今絲毫不易視昔猶今視今猶昔松關一徑花狼藉祖忌拈香德山戶限何曾踏著鰲山客床何曾睡著與麼見人與麼行脚提起香云只者些兒何曾嗅著且道是甚麼彷彿刺桐根依稀破木杓謝首座秉拂上堂拈主丈雙行敲唱理事一如山從平處除海向滴邊拈只如韶陽單提一字作麼生透掉主丈俱上堂珠投濁水濁水俱清禪攝亂心亂心乃定與麼會去正落今時學者之病總不與麼時如何罔念則狂克念則聖解夏小參兼謝新舊首座藏主離緣而照龝澄玉宇月蘸方池融事而真露冷銀床泉通海眼留香簾捲屋簷外尺五無天烏石雲橫箭鋒頭轉身有路天宮說法未離教來一字上重添古篆者裡見得總塵毛剎海無非圓覺伽藍逈絕沈空之相融十世古今無非自恣時節了無新舊之殊一念全超萬機𥨊削靈虗廓徹洞照無痕便與麼其時如何老鼠趂猢猻舉石霜有二僧到仰山一日乃嘆云此間無一人會禪一日普請擔柴次仰山故下柴云道甚麼二僧無語仰云又道此間無一人會禪仰山歸謂是溈山云二僧被某甲勘溈山云子作麼生勘破它仰山舉前話溈山云寂子又被吾勘破師拈云二僧狂言似戇羝羊觸藩仰山冷地著忙家狗護竇溈山末後與麼道也是愛忘其醜佛成道上堂執著者星子餓寒業莫逃不知黃屋貴偏樂雪山高何故色窮歸皂除夜小參真機密運天何言而四時行大化潛施地何言而萬物生日月星辰無新無舊山河大地無變無更衲僧家被位上蒲團頭計較不得挨拶不行捱到臈月三十日眼睛鼻孔依舊只麼生難滿是窮坑上堂謝新知客并蔣山藏主動靜一致賓主互融玻𭹳盞香飜寒㵎雪華藏海紅颺落花風猿驚鶴怨月明山空暮雪多是憶江東端午上堂兼謝法眷高釘桃符低懸艾虎百怪千妖掃蹤無路弟兄相見不揚眉一句渾崙洞賓主舊話誰圓善財歸去山山寒掩黃梅雨除夜小參舊歲欲去未去六馬難將朽索御新歲欲來未來羊頭車子和月推挨拶不行脚根紅線抖擻不下頭上青灰殊不知道絕古今雲橫烏石法萬法見水肅陰崖衲僧家極歲窮年殆類彌猴捉影拶到年窮歲盡不離鼠窟生涯卓主丈泠灰豆𪹼大地春回床頭主丈放花開舉僧問白雲端和尚云年窮歲盡是如何答云眉在眼上師拈云對機酬酢如理如事則不無白雲師翁撿點將來猶欠一著有問雪峰年窮歲盡是如何只向它道山中無皷角曉鐘是元正臈八上堂蘆膝黃金冷𪹼芽定寒午夜燦星華六年不了修行事白日虗消一麥麻雪峰與麼道是讚佗是毀他咄眼裡不著沙上堂風高塞鴈露冷庭螿老胡特地歷魏遊梁秋杵閑添搗夜長上堂曉露明殘葉晴雲擁翠杉遍參人不會秋老百城南上堂舉僧問古德如何是祖師西來意東籬黃菊學人不會九日重陽師頌云野店疎籬護竹烟新蒭初熟菊花天主人惜別偏留客賤價饒沽不論錢入佛五臟黃面老子於無量劫中頭出頭沒熏修無明業因成就無明業果乃至菩薩聲聞天人釋梵同一眼見同一耳聞彼彼作業彼彼相似逗到二千年後雪嶺山前黃金殿上心肝五臟一一呈露盡大地人只眨得眼山僧今日向諸人無插手處奮一隻臂從頭為伊收捨一上看看度五臟釋迦還釋迦文殊普賢還文殊普賢迦葉阿難還迦葉阿難釋梵天王還釋梵天王非長非短無欠無餘亘古亘今無異無別貴使宅心以寧安神以定如空藏空如鏡照鏡與麼說話為或是壯佛威光耶振佛恩德耶一彩兩賽重建天下雪峰坊上牌額玄關巨闢樹法幢於委地之時祖運重興棟大法於擎天之日何莫由斯道無今古際其時也覺有後先一徑通玄千五象龍蹴踏層簷插漢百億日月旋環㵎水松風熾然宣說鸞翔鳳舞雪漢昭回以此洗光佛日以此永壯皇基以此揭衲僧正眼以此大佛祖門庭只今當陽高揭諸人還委悉麼天下雪峰天下仰止臘八開佛光明雪山昔日午夜見星一點毛頭現雪峰今日白晝見日雙眉眼上橫金色光中金毛踞地銀色界內玉象騰身慶喜多聞未分泥水飲光微笑突出眼睛奇哉奇哉大地眾生俱有如來智慧德相是誰妄想妄自起滅是誰執著徒自丹青今則曲奏松風琴鳴㵎水祥雲凝曉瑞雪舒晴山僧試向一毫頭上助發實相義去也呈起筆云見麼今佛放光明重入列代祖堂立牌兼自預入者裡是從上列祖安排已定底分杓增一絲毫不得妄自奔馳減一絲毫不得徒勞鑽鑿須是有衝樓跨竈之英材方可展托祖宗之妙略將謂灰寒火冷谷變陵迁雲散水流填溝塞壑指牌為有者些閑名到底終難剗削一新華搆星遶簷楹玉立祖庭祥開樓閣度牌無板齒底過者邊著又度牌云無鼻孔底過那邊著不分楚越玉戶無樞把定封疆鐵關有鑰又度牌云攙先容老僧一脚施主張深㵎入祠堂架祖殿并松山閣離重城香風一葉隨波輕登雪嶠炎雲散盡千峰曉一靈真性隱顯全諧三際頓超去來得妙慨然一諾揮囊金以助建興煥爾新規開樓閣于雲縹緲住山顯刀斧之無痕叱吒掃寒灰於劫燒烏石嶺橫空萬仞字磨崖莫既雕鑽赤松子遠曳長裾躐英風不離談笑深㵎源分古㵎流心月輝涵松月皎銘公之施昭昭乎前祠公以堂灯灯永紹山僧與麼說話總是彩繪深㵎影子邊事只如不歷化城直登寶所一句是如何虗榻迓公久矣黃雲岩宣教掩土緣聚為生散為死白日長繩繫不住蓬萊水淺人世非虗幻轉頭皆夢事去家不遠奢山春山中住城最住處傳家契券明有據青石丹書黃姓字左為龍右為虎天為門地為戶以此澤屋廬以此福孫子棣萼芳聯枝葉昌蘭玉森羅茁庭宇神衛山林永安永固千古萬古一坯土肅翁和尚入塔七處住山嗣偃溪示向上機提末後句三山孤月烟秋光五里烟雲迷古路建善住最初法幢居天王莊嚴住處掃任仙丹竈靈光耀玉黍之珠登謝郎釣舟竿影拂珊瑚之樹雪峰頂上直教澗水逆流直指門頭復普通年事出遊歸隱城市山林生死去來霜花曉露翠峰壽塔已先開葉落歸根無剩語便與麼去時如何竺國夜三更閻浮日車午卓船
